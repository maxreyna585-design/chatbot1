<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Ambiental - Salaverry</title>

    <!-- Archivo de estilos -->
    <link rel="stylesheet" href="style.css">

    <!-- Iconos -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <!-- Hojas decorativas -->
    <div class="hojas">
        <span>🍃</span>
        <span>🌿</span>
        <span>🍃</span>
        <span>🌱</span>
        <span>🍃</span>
    </div>

    <!-- Título -->
    <header>
        <h1>🌎 Chatbot sobre la Contaminación en Salaverry 🌊</h1>
        <p>¡Cuidemos juntos nuestro medio ambiente!</p>
    </header>

    <!-- Caja del chatbot -->
    <div class="chat-container">

        <div class="chat-header">
            <i class="fa-solid fa-robot"></i>
            <span>Bot Ambiental</span>
        </div>

        <!-- Aquí aparecerán los mensajes -->
        <div id="chat-box" class="chat-box">
            <div class="mensaje bot">
                ¡Hola! Soy tu chatbot ambiental. Pregúntame sobre la contaminación en Salaverry. 🌿
            </div>
        </div>

        <!-- Área para escribir -->
        <div class="input-area">
            <input
                type="text"
                id="user-input"
                placeholder="Escribe tu pregunta..."
            >

            <button id="send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>

    </div>

    <!-- Pie de página -->
    <footer>
        <p>Proyecto educativo sobre el cuidado del medio ambiente en Salaverry 🌎</p>
    </footer>

    <!-- Archivo JavaScript -->
    <script src="script.js"></script>

</body>
</html>
